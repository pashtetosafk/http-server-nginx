version: '3.8'

services:
  backend:
    build: ./backend
    container_name: python-backend
    expose:
      - "8080"
    networks:
      - internal-network

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - internal-network

networks:
  internal-network:
    driver: bridge
