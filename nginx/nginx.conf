# upstream блок - определяет группу backend серверов
upstream backend {
    # Имя сервиса 'python-backend' из docker-compose.yml
    # Порт 8080 - внутренний порт Python сервера
    server backend:8080;
    
    # Можно добавить несколько серверов для балансировки:
    # server python-backend2:8080;
    # server python-backend3:8080;
}

server {
    # Nginx слушает порт 80 внутри Docker-сети
    listen 80;
    
    # Имя сервера (можно использовать _ как wildcard)
    server_name _;
    
    # Логи (опционально)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Корневой location - обрабатывает все запросы
    location / {
        # Проксируем запросы на upstream backend
        proxy_pass http://backend;
        
        # Проксируем заголовки, чтобы backend получал реальные данные клиента
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Таймауты соединения
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
